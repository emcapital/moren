<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moren Timepiece - Secure Admin Portal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050608">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Moren Admin">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        .font-luxury { font-family: 'Cinzel', serif; }
        .font-sans-clean { font-family: 'Montserrat', sans-serif; }

        /* Keyframes for Watch Complications and Toasts */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.15; }
            50% { transform: scale(1.1); opacity: 0.35; }
            100% { transform: scale(0.95); opacity: 0.15; }
        }
        @keyframes float-slow {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes slide-in-bottom-right {
            0% { transform: translateY(30px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes slide-out-bottom-right {
            0% { transform: translateY(0) opacity: 1; }
            100% { transform: translateY(20px) opacity: 0; }
        }

        .animate-pulse-ring { animation: pulse-ring 8s ease-in-out infinite; }
        .animate-float { animation: float-slow 6s ease-in-out infinite; }
        .animate-notification { animation: slide-in-bottom-right 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-notification-out { animation: slide-out-bottom-right 0.3s ease-in forwards; }
    </style>
</head>
<body id="portal-body" class="bg-[#050608] font-sans-clean min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8 overflow-x-hidden relative text-slate-300 transition-all duration-[1000ms] cubic-bezier(0.16, 1, 0.3, 1)">

    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-72 h-72 md:w-96 md:h-96 bg-amber-950/10 rounded-full blur-[100px] md:blur-[120px] animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 md:w-[400px] md:h-[400px] bg-yellow-950/10 rounded-full blur-[120px] md:blur-[150px] animate-pulse" style="animation-duration: 12s;"></div>
    </div>

    <div id="main-card" class="w-full max-w-sm md:max-w-4xl min-h-[500px] md:h-[620px] bg-[#0d0f14]/95 backdrop-blur-md rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-slate-800/60 overflow-hidden flex flex-col md:flex-row relative z-10 transition-all duration-[800ms] cubic-bezier(0.16, 1, 0.3, 1) hover:border-amber-900/30">
        
        <div class="hidden md:flex md:w-1/2 bg-[#11141c] p-12 flex-col justify-between relative overflow-hidden border-r border-slate-800/40 group">
            <div class="absolute -right-24 -bottom-24 w-96 h-96 border border-amber-950/20 rounded-full pointer-events-none transition-transform duration-1000 group-hover:scale-105"></div>
            <div class="absolute -right-12 -bottom-12 w-72 h-72 border-2 border-amber-500/5 rounded-full pointer-events-none animate-pulse-ring"></div>
            <div class="absolute -right-4 -bottom-4 w-56 h-56 border border-dashed border-amber-500/10 rounded-full pointer-events-none animate-[spin_240s_linear_infinite]"></div>
            
            <div class="flex items-center gap-3 relative z-10">
                <div class="w-8 h-8 rounded-full border border-amber-500/40 flex items-center justify-center text-amber-400 text-xs font-luxury bg-amber-950/30 font-bold">M</div>
                <span class="font-luxury text-xs tracking-[0.25em] text-slate-200">MOREN TIMEPIECE</span>
            </div>

            <div class="relative z-10 animate-float">
                <p class="text-amber-500/60 uppercase tracking-[0.3em] text-[9px] font-semibold mb-3">Secure Vault Gateway</p>
                <h2 class="font-luxury text-3xl text-slate-100 leading-relaxed tracking-wide">PRESERVING LEGACY,<br>SECONDS AT A TIME.</h2>
            </div>

            <p class="text-[9px] text-slate-500 relative z-10 tracking-[0.15em] uppercase">System Registry &copy; 2026</p>
        </div>

        <div class="w-full md:w-1/2 p-6 sm:p-10 md:p-12 flex flex-col justify-center h-full my-auto">
            
            <div class="flex flex-col items-center justify-center gap-2 mb-8 md:hidden text-center">
                <div class="w-9 h-9 rounded-full border border-amber-500/40 flex items-center justify-center text-amber-400 text-sm font-luxury font-bold bg-amber-950/20">M</div>
                <span class="font-luxury text-xs tracking-[0.2em] text-slate-200 mt-1">MOREN TIMEPIECE</span>
            </div>

            <div class="mb-6 text-center md:text-left">
                <h1 class="text-lg md:text-xl font-light text-slate-100 uppercase tracking-[0.15em]">Authentication</h1>
                <p class="text-xs text-slate-400 mt-2">Sign-in protocol requires certified authorization keys.</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="group/input">
                    <label for="email" class="block text-[10px] font-medium text-slate-400 group-focus-within/input:text-amber-400 uppercase tracking-widest mb-1.5 transition-colors duration-200">Admin Identity</label>
                    <input 
                        type="email" 
                        id="email" 
                        required 
                        placeholder="operator@morentimepiece.com"
                        class="w-full bg-[#11141c]/80 px-4 py-3 border border-slate-800/80 rounded-lg text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-amber-500/50 focus:border-amber-500/50 transition-all duration-300 text-xs tracking-wider hover:border-slate-700"
                    >
                </div>

                <div class="group/input">
                    <label for="password" class="block text-[10px] font-medium text-slate-400 group-focus-within/input:text-amber-400 uppercase tracking-widest mb-1.5 transition-colors duration-200">Secure Passphrase</label>
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        placeholder="••••••••"
                        class="w-full bg-[#11141c]/80 px-4 py-3 border border-slate-800/80 rounded-lg text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-amber-500/50 focus:border-amber-500/50 transition-all duration-300 text-xs tracking-wider hover:border-slate-700"
                    >
                </div>

                <button 
                    type="submit" 
                    id="submit-btn"
                    class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-semibold py-3.5 px-4 rounded-lg transition-all duration-300 shadow-[0_4px_20px_rgba(245,158,11,0.1)] hover:shadow-[0_4px_25px_rgba(245,158,11,0.25)] tracking-[0.2em] text-[10px] uppercase mt-2 focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:ring-offset-2 focus:ring-offset-[#0d0f14] active:scale-[0.99] flex items-center justify-center gap-2"
                >
                    <span id="btn-text">Log In</span>
                </button>
            </form>

            <p class="text-center text-[9px] tracking-wider text-slate-600 mt-8 md:hidden">&copy; 2026 MOREN TIMEPIECE.</p>
        </div>
    </div>

    <div id="notification-perimeter" class="fixed bottom-4 right-4 left-4 sm:left-auto z-50 flex flex-col gap-3 max-w-sm pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // Your provided config
        const firebaseConfig = {
            apiKey: "AIzaSyAoyAOyfJsqlK_Pe6pmfA5cTexx0IOcH9g",
            authDomain: "moren-325fd.firebaseapp.com",
            projectId: "moren-325fd",
            storageBucket: "moren-325fd.firebasestorage.app",
            messagingSenderId: "1015241645428",
            appId: "1:1015241645428:web:2d6366a8bdc38a5fb72021",
            measurementId: "G-1HDSV3V8P1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const perimeter = document.getElementById('notification-perimeter');
        const mainCard = document.getElementById('main-card');
        const bodyEl = document.getElementById('portal-body');

        createToast("Perimeter Active", "System parameters and administrative gateway tokens are systematically logged.", "info");

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            btnText.innerText = "Verifying Credentials...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                createToast("Access Granted", "Session authenticated successfully. Loading dashboard context...", "success");
                
                // --- KICK OFF FULL SCREEN FADE OUT TRANSITIONS ---
                setTimeout(() => {
                    // Fade out and scale down the login card smoothly
                    mainCard.style.opacity = '0';
                    mainCard.style.transform = 'scale(0.92)';
                    
                    // Fade the page background into pure jet-black
                    bodyEl.style.backgroundColor = '#000000';
                }, 400);

                // Clear input structures and redirect once visual transition concludes
                form.reset();
                setTimeout(() => {
                    window.location.href = "./components/dashboard.html"; 
                }, 1300);

            } catch (error) {
                let alertMsg = error.message;
                if (error.code === 'auth/invalid-credential') {
                    alertMsg = "The identity markers or private passphrase provided are unverified.";
                } else if (error.code === 'auth/too-many-requests') {
                    alertMsg = "Access temporarily frozen due to repeated failed token transactions.";
                }
                
                createToast("Authentication Failed", alertMsg, "error");
                submitBtn.disabled = false;
                btnText.innerText = "Authorize Console";
            }
        });

        function createToast(title, body, type = "info") {
            const id = 'toast-' + Date.now();
            let strokeColor = "text-amber-400 bg-amber-500/10 border-amber-500/30";
            if(type === "success") strokeColor = "text-emerald-400 bg-emerald-500/10 border-emerald-500/30";
            if(type === "error") strokeColor = "text-rose-400 bg-rose-500/10 border-rose-500/30";

            const toastHTML = `
                <div id="${id}" class="bg-[#11141c]/95 backdrop-blur-md border border-slate-800/80 rounded-xl p-4 shadow-2xl flex gap-3 pointer-events-auto animate-notification relative overflow-hidden group/toast">
                    <div class="w-5 h-5 rounded-full border flex items-center justify-center shrink-0 mt-0.5 ${strokeColor}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3 h-3"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 00-10 1zm3 8V5.5a3 3 0 10-6 0V8.99h6z" clip-rule="evenodd" /></svg>
                    </div>
                    <div class="pr-4">
                        <h4 class="text-[10px] font-semibold text-slate-200 uppercase tracking-widest">${title}</h4>
                        <p class="text-[11px] text-slate-400 leading-relaxed mt-1">${body}</p>
                    </div>
                    <button type="button" class="toast-close absolute top-3 right-3 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
                    </button>
                    <div class="progress-bar absolute bottom-0 left-0 h-[2px] bg-amber-500/30 w-full transition-all duration-[3000ms] ease-linear"></div>
                </div>
            `;

            perimeter.insertAdjacentHTML('beforeend', toastHTML);
            const target = document.getElementById(id);
            
            setTimeout(() => {
                const bar = target.querySelector('.progress-bar');
                if(bar) bar.style.width = '0%';
            }, 50);

            target.querySelector('.toast-close').addEventListener('click', () => dismiss(target));
            setTimeout(() => dismiss(target), 3000);
        }

        function dismiss(el) {
            if(!el) return;
            el.classList.remove('animate-notification');
            el.classList.add('animate-notification-out');
            setTimeout(() => el.remove(), 350);
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered successfully.', reg.scope))
                    .catch(err => console.log('Service Worker registration failure:', err));
            });
        }
    </script>
</body>
</html>
